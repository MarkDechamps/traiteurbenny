  - icon : ti-fire
    title : Ambacht & Passie
    content : "Traiteur Benny is gespecialiseerd in Low & Slow BBQ. Met onze smoker-trailer bereiden we authentieke Pulled Pork, Brisket en Ribs rechtstreeks op locatie."

  - icon : ti-truck
    title : BBQ op Locatie
    content : "Onze smoker-trailer komt naar jouw feest, bedrijfsevenement of festival. Van klein tot groot — wij regelen alles van A tot Z."

  - icon : ti-heart
    title : Echte Smaak
    content : "Geen compromissen: enkel de beste cuts, houtgerookt op lage temperatuur gedurende uren. Het resultaat? Sappig vlees dat van het bot valt."
