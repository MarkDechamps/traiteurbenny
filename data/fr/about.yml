about:
  enable : true
  title : "À Propos"
  about_item :
  - icon : ti-fire
    title : "Artisanat & Passion"
    content : "Traiteur Benny est spécialisé dans le BBQ Low & Slow. Avec notre remorque fumoir, nous préparons du Pulled Pork, du Brisket et des Ribs authentiques directement sur place."

  - icon : ti-truck
    title : "BBQ Sur Place"
    content : "Notre remorque fumoir se déplace jusqu''à votre fête, événement d''entreprise ou festival. Grand ou petit — nous gérons tout de A à Z."

  - icon : ti-heart
    title : "Vrai Goût"
    content : "Pas de compromis : uniquement les meilleures pièces, fumées au bois à basse température pendant des heures. Le résultat ? Une viande juteuse qui fond dans la bouche."
